<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis-Omega | Command Center</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Mono', 'Consolas', monospace;
      background: #0a0a0f;
      color: #c8e6ff;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1a2a3a;
      padding-bottom: 16px;
    }

    header h1 {
      font-size: 1.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #4fc3f7;
      flex: 1;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00e676;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .section-title {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5c8aa8;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: #0d1821;
      border: 1px solid #1a2f45;
      border-radius: 10px;
      padding: 16px;
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5c8aa8;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e0f7fa;
    }

    .card-value.profit { color: #00e676; }
    .card-value.warn { color: #ffb74d; }
    .card-value.small { font-size: 1.1rem; }

    .chart-container {
      background: #0d1821;
      border: 1px solid #1a2f45;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .chart-container h2 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5c8aa8;
      margin-bottom: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:not(:disabled):active { opacity: 0.7; }

    .btn-pause   { background: #d32f2f; color: #fff; }
    .btn-resume  { background: #00897b; color: #fff; }
    .btn-refresh { background: #1565c0; color: #fff; }
    .btn-logs    { background: #37474f; color: #cfd8dc; }
    .btn-send    { background: #4527a0; color: #fff; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .provider-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      background: #0d2d42;
      color: #4fc3f7;
      border: 1px solid #1a4a6a;
    }

    .task-form {
      background: #0d1821;
      border: 1px solid #1a2f45;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .task-form textarea {
      width: 100%;
      background: #060c12;
      border: 1px solid #1a2f45;
      border-radius: 8px;
      color: #c8e6ff;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px 12px;
      resize: vertical;
      min-height: 72px;
      outline: none;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .task-form textarea:focus { border-color: #4fc3f7; }
    .task-form textarea::placeholder { color: #2a4a5a; }

    .task-form-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .task-form-row button { flex-shrink: 0; padding: 10px 18px; }

    .queue-badge {
      font-size: 0.75rem;
      color: #5c8aa8;
    }

    .ledger-block {
      background: #0d1821;
      border: 1px solid #1a2f45;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .ledger-block h2 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5c8aa8;
      margin-bottom: 12px;
    }

    .ledger-list { display: flex; flex-direction: column; gap: 8px; }

    .ledger-item {
      background: #060c12;
      border: 1px solid #1a2f45;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      line-height: 1.6;
    }

    .ledger-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ledger-provider {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 0.68rem;
      background: #0d2d42;
      color: #4fc3f7;
      border: 1px solid #1a4a6a;
    }

    .ledger-cost { color: #00e676; font-weight: 700; }
    .ledger-time { color: #5c8aa8; font-size: 0.7rem; }
    .ledger-prompt { color: #a0c8e0; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ledger-response { color: #607d8b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ledger-empty { color: #2a4a5a; font-size: 0.8rem; text-align: center; padding: 16px 0; }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #0d1821;
      border: 1px solid #1a2f45;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      transform: translateY(40px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #1a2f45;
      flex-shrink: 0;
    }

    .modal-header h3 {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5c8aa8;
    }

    .modal-close {
      background: none;
      border: none;
      color: #5c8aa8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      letter-spacing: 0;
    }

    .modal-close:active { opacity: 0.6; }

    .modal-body {
      overflow-y: auto;
      padding: 12px 16px 24px;
      flex: 1;
    }

    .alert-list { display: flex; flex-direction: column; gap: 8px; }

    .alert-item {
      background: #060c12;
      border: 1px solid #1a2f45;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      line-height: 1.6;
    }

    .alert-item-time {
      font-size: 0.68rem;
      color: #5c8aa8;
      margin-bottom: 4px;
    }

    .alert-item-text { color: #c8e6ff; white-space: pre-wrap; word-break: break-word; }

    .alert-icon-warn { color: #ffb74d; }
    .alert-icon-ok   { color: #00e676; }
    .alert-icon-err  { color: #ef5350; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a3a4a;
      color: #e0f7fa;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      border: 1px solid #2a5a7a;
      white-space: nowrap;
      z-index: 200;
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>Jarvis-Omega</h1>
</header>

<div class="grid">
  <div class="card">
    <div class="card-label">Uptime</div>
    <div class="card-value small" id="uptime">—</div>
  </div>
  <div class="card">
    <div class="card-label">Provider</div>
    <div class="card-value" id="provider"><span class="provider-tag">—</span></div>
  </div>
  <div class="card">
    <div class="card-label">Success Rate</div>
    <div class="card-value" id="successRate">—</div>
  </div>
  <div class="card">
    <div class="card-label">Total Profit</div>
    <div class="card-value profit" id="profit">—</div>
  </div>
  <div class="card">
    <div class="card-label">Requests</div>
    <div class="card-value" id="requests">—</div>
  </div>
  <div class="card">
    <div class="card-label">Workers / Queue</div>
    <div class="card-value warn" id="workers">—</div>
  </div>
</div>

<div class="chart-container">
  <h2>Request History</h2>
  <canvas id="requestChart" height="110"></canvas>
</div>

<div class="chart-container">
  <h2>Profit Over Time</h2>
  <canvas id="profitChart" height="110"></canvas>
</div>

<div class="actions">
  <button class="btn-pause" onclick="sendCommand('pause')">Pause Workers</button>
  <button class="btn-resume" onclick="sendCommand('resume')">Resume Workers</button>
</div>

<div class="btn-row">
  <button class="btn-refresh" onclick="refresh()">Refresh</button>
  <button class="btn-logs" onclick="openLogsModal()">Logs</button>
</div>

<div class="task-form">
  <div class="section-title">Send Task to Queue</div>
  <textarea id="taskInput" placeholder="Enter prompt for AI workers... (Ctrl+Enter to send)"></textarea>
  <div class="task-form-row">
    <button class="btn-send" id="sendBtn" onclick="submitTask()">Send Task</button>
    <span class="queue-badge">Queue: <span id="queueSize">—</span> pending</span>
  </div>
</div>

<div class="ledger-block">
  <h2>Recent Transactions</h2>
  <div class="ledger-list" id="ledgerList">
    <div class="ledger-empty">No transactions yet.</div>
  </div>
</div>

<!-- Alerts Modal -->
<div class="modal-overlay" id="logsModal" onclick="handleModalClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Alert History</h3>
      <button class="modal-close" onclick="closeLogsModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert-list" id="alertList">
        <div class="ledger-empty">Loading...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const BASE = '';
  const timeLabels = [];
  const profitHistory = [];

  const reqCtx = document.getElementById('requestChart').getContext('2d');
  const profCtx = document.getElementById('profitChart').getContext('2d');

  const requestChart = new Chart(reqCtx, {
    type: 'line',
    data: {
      labels: timeLabels,
      datasets: [
        { label: 'Success', data: [], borderColor: '#00e676', backgroundColor: 'rgba(0,230,118,0.08)', tension: 0.4, fill: true, pointRadius: 2 },
        { label: 'Failed',  data: [], borderColor: '#ef5350', backgroundColor: 'rgba(239,83,80,0.08)',  tension: 0.4, fill: true, pointRadius: 2 }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#c8e6ff', font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#5c8aa8', font: { size: 9 } }, grid: { color: '#0f1e2a' } },
        y: { ticks: { color: '#5c8aa8', font: { size: 9 } }, grid: { color: '#0f1e2a' } }
      }
    }
  });

  const profitChart = new Chart(profCtx, {
    type: 'bar',
    data: {
      labels: timeLabels,
      datasets: [{
        label: 'Profit USD',
        data: profitHistory,
        backgroundColor: 'rgba(79,195,247,0.35)',
        borderColor: '#4fc3f7',
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#c8e6ff', font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: '#5c8aa8', font: { size: 9 } }, grid: { color: '#0f1e2a' } },
        y: { ticks: { color: '#5c8aa8', font: { size: 9 } }, grid: { color: '#0f1e2a' } }
      }
    }
  });

  function formatUptime(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sc = Math.floor(s % 60);
    return `${h}h ${m}m ${sc}s`;
  }

  function formatTs(ts) { return new Date(ts * 1000).toLocaleTimeString(); }
  function formatTsFull(ts) { return new Date(ts * 1000).toLocaleString(); }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function alertIcon(text) {
    if (text.includes('⚠️')) return '<span class="alert-icon-warn">⚠️</span>';
    if (text.includes('✅')) return '<span class="alert-icon-ok">✅</span>';
    if (text.includes('❌')) return '<span class="alert-icon-err">❌</span>';
    return '🔔';
  }

  function stripHtmlTags(s) {
    return s.replace(/<[^>]+>/g, '');
  }

  function showToast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = ok ? '#0d2d42' : '#3d0d0d';
    el.style.borderColor = ok ? '#2a5a7a' : '#7a2a2a';
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2800);
  }

  async function fetchMetrics() {
    try {
      const res = await fetch(`${BASE}/api/metrics`);
      if (!res.ok) throw new Error();
      const m = await res.json();

      document.getElementById('uptime').textContent = formatUptime(m.uptime_seconds);
      document.getElementById('provider').innerHTML = `<span class="provider-tag">${escHtml(m.active_provider)}</span>`;
      document.getElementById('successRate').textContent = `${m.success_rate}%`;
      document.getElementById('profit').textContent = `$${parseFloat(m.profit_usd).toFixed(4)}`;
      document.getElementById('requests').textContent = m.requests_total;

      const paused = m.workers_paused;
      const qSize = m.queue_size ?? '?';
      document.getElementById('workers').textContent = paused ? `Paused · ${qSize}` : `Running · ${qSize}`;
      document.getElementById('workers').style.color = paused ? '#ef5350' : '#00e676';
      document.getElementById('statusDot').style.background = paused ? '#ef5350' : '#00e676';
      document.getElementById('queueSize').textContent = qSize;

      const label = new Date().toLocaleTimeString();
      if (timeLabels.length >= 12) {
        timeLabels.shift();
        requestChart.data.datasets[0].data.shift();
        requestChart.data.datasets[1].data.shift();
        profitHistory.shift();
      }
      timeLabels.push(label);
      requestChart.data.datasets[0].data.push(m.requests_success);
      requestChart.data.datasets[1].data.push(m.requests_failed);
      profitHistory.push(parseFloat(m.profit_usd));
      requestChart.update('none');
      profitChart.update('none');
    } catch {
      showToast('Failed to fetch metrics', false);
    }
  }

  async function fetchLedger() {
    try {
      const res = await fetch(`${BASE}/api/ledger?limit=10`);
      if (!res.ok) return;
      const data = await res.json();
      const txns = (data.transactions || []).slice().reverse();
      const list = document.getElementById('ledgerList');
      if (txns.length === 0) {
        list.innerHTML = '<div class="ledger-empty">No transactions yet.</div>';
        return;
      }
      list.innerHTML = txns.map(t => `
        <div class="ledger-item">
          <div class="ledger-item-header">
            <span class="ledger-provider">${escHtml(t.provider)}</span>
            <span class="ledger-cost">+$${parseFloat(t.cost_usd).toFixed(6)}</span>
            <span class="ledger-time">${formatTs(t.ts)} · ${t.elapsed_sec}s</span>
          </div>
          <div class="ledger-prompt">▶ ${escHtml(t.prompt_snippet)}</div>
          <div class="ledger-response">◀ ${escHtml(t.response_snippet)}</div>
        </div>
      `).join('');
    } catch { }
  }

  async function fetchAlerts() {
    try {
      const res = await fetch(`${BASE}/api/alerts`);
      if (!res.ok) return;
      const data = await res.json();
      const alerts = data.alerts || [];
      const list = document.getElementById('alertList');
      if (alerts.length === 0) {
        list.innerHTML = '<div class="ledger-empty">No alerts yet.</div>';
        return;
      }
      list.innerHTML = alerts.map(a => {
        const clean = stripHtmlTags(a.text);
        const icon = alertIcon(a.text);
        return `
          <div class="alert-item">
            <div class="alert-item-time">${formatTsFull(a.ts)} · <code>${escHtml(a.dedup_key)}</code></div>
            <div class="alert-item-text">${icon} ${escHtml(clean)}</div>
          </div>`;
      }).join('');
    } catch { }
  }

  async function sendCommand(cmd) {
    try {
      const res = await fetch(`${BASE}/api/command`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: cmd }),
      });
      const data = await res.json();
      showToast(data.message || 'Done', res.ok);
      if (res.ok) fetchMetrics();
    } catch {
      showToast('Command failed', false);
    }
  }

  async function submitTask() {
    const input = document.getElementById('taskInput');
    const btn = document.getElementById('sendBtn');
    const prompt = input.value.trim();
    if (!prompt) { showToast('Enter a prompt first', false); return; }
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const res = await fetch(`${BASE}/api/task`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });
      const data = await res.json();
      if (res.ok) {
        showToast(`Task queued. Queue: ${data.queue_size}`);
        input.value = '';
        document.getElementById('queueSize').textContent = data.queue_size;
      } else {
        showToast(data.detail || 'Failed to queue task', false);
      }
    } catch {
      showToast('Network error', false);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Task';
    }
  }

  async function openLogsModal() {
    document.getElementById('alertList').innerHTML = '<div class="ledger-empty">Loading...</div>';
    document.getElementById('logsModal').classList.add('open');
    await fetchAlerts();
  }

  function closeLogsModal() {
    document.getElementById('logsModal').classList.remove('open');
  }

  function handleModalClick(e) {
    if (e.target === document.getElementById('logsModal')) closeLogsModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLogsModal();
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitTask();
  });

  async function refresh() {
    await Promise.all([fetchMetrics(), fetchLedger()]);
  }

  refresh();
  setInterval(refresh, 10000);
</script>
</body>
</html>
